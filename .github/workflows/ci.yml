name: CI

on:
  push:
    branches: [main, claude/lens-os-phase0]
  pull_request:
    branches: [main, claude/lens-os-phase0]

jobs:
  test:
    name: Tests (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --cov=src --cov-report=term-missing -q

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    continue-on-error: true  # informational only — SDK stubs have known gaps

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports --no-error-summary
